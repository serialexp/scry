[workspace]
resolver = "2"
members = [
    "crates/binschema-runtime",
    "crates/proto",
    "crates/noise-spewer",
    "crates/noise-sink",
]

[workspace.package]
edition = "2021"
rust-version = "1.75"
license = "MIT OR Apache-2.0"
repository = "https://github.com/serialexp/scry"

[workspace.dependencies]
binschema-runtime = { path = "crates/binschema-runtime" }
scry-proto        = { path = "crates/proto" }

anyhow    = "1"
clap      = { version = "4", features = ["derive"] }
rand      = "0.8"
rand_distr = "0.4"
thiserror = "1"
tokio     = { version = "1", features = ["macros", "rt-multi-thread", "net", "io-util", "sync", "time", "signal"] }
tracing   = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
twox-hash = "1.6"
uuid      = { version = "1", features = ["v7", "fast-rng"] }
zstd      = "0.13"

[workspace.lints.rust]
unsafe_code = "forbid"

[profile.release]
lto = "thin"
codegen-units = 1
