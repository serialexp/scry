# The scry query daemon (`scry query`) — the architectural counterpart to
# `scry ingest`. It serves scry-server::QueryService over the binschema-over-TCP
# wire on :4100, reading parquet blocks straight from the object-storage bucket.
# Clients connect with `scry get --remote <addr>:4100`.
#
# Single replica. The daemon keeps its own SQLite catalog (NOT shared with the
# ingest server's WAL volume) on an emptyDir. On a cold boot it restores the
# catalog from the bucket snapshot the ingester uploads (D-055) in one GET —
# `_catalog/snapshot.sqlite` — instead of walking every block sidecar, then its
# own built-in poll + full-walk convergence loops keep it fresh (no seed init
# container or reconcile sidecar needed). The catalog is fully rebuildable from
# the bucket, so the emptyDir stays — no PVC.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scry-query
  namespace: scry
  labels:
    app: scry-query
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scry-query
  template:
    metadata:
      labels:
        app: scry-query
    spec:
      # The image runs as UID 65532 (distroless :nonroot). fsGroup makes the
      # kubelet chown the emptyDir to that group on mount so the non-root
      # process can write the SQLite catalog + WAL.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
        - name: query
          image: serialexp/scry:latest
          imagePullPolicy: IfNotPresent
          command:
            - scry
            - query
            # Bind all interfaces (default is loopback) so the ClusterIP
            # Service can route to the pod IP. Not publicly exposed — the pod
            # network is cluster-internal and the Service is ClusterIP-only.
            - --listen
            - 0.0.0.0:4100
            - --catalog
            - /catalog/catalog.sqlite
          envFrom:
            - secretRef:
                name: scry-objstore
          ports:
            - name: query
              containerPort: 4100
          readinessProbe:
            tcpSocket:
              port: 4100
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              # Headroom over the daemon's default 1024 MiB DataFusion budget
              # (streaming operators aren't accounted, so true RSS runs higher).
              memory: "1536Mi"
          volumeMounts:
            - name: catalog
              mountPath: /catalog
      volumes:
        - name: catalog
          emptyDir: {}
