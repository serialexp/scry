# Template for the object-store credentials the ingest server reads from
# SCRY_OBJSTORE_* env. Copy to objstore-secret.yaml, fill in real values, and
# apply OUT OF BAND — never commit the filled-in version.
#
# R2:      endpoint https://<accountid>.r2.cloudflarestorage.com, region "auto",
#          path-style "false".
# Hetzner: endpoint https://<region>.your-objectstorage.com, region e.g. "fsn1",
#          path-style "false".
apiVersion: v1
kind: Secret
metadata:
  name: scry-objstore
  namespace: scry
type: Opaque
stringData:
  SCRY_OBJSTORE_ENDPOINT: "https://CHANGEME.r2.cloudflarestorage.com"
  SCRY_OBJSTORE_REGION: "auto"
  SCRY_OBJSTORE_BUCKET: "scry"
  SCRY_OBJSTORE_ACCESS_KEY_ID: "CHANGEME"
  SCRY_OBJSTORE_SECRET_ACCESS_KEY: "CHANGEME"
  # R2/Hetzner are virtual-host style. (Garage dev uses "true".)
  SCRY_OBJSTORE_PATH_STYLE: "false"
