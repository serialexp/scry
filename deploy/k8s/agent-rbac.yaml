# The agent watches pods (cluster-wide, but field-selected to its own node at
# runtime) purely to enrich log streams with pod labels. Read-only on pods.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: scry-agent
  namespace: scry
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: scry-agent
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: scry-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: scry-agent
subjects:
  - kind: ServiceAccount
    name: scry-agent
    namespace: scry
