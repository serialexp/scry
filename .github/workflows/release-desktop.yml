name: Release desktop app

# Builds the Tauri desktop query app (desktop/) and attaches the
# per-platform bundles to a GitHub Release. The core server crates are
# NOT built here — they're a separate, Docker-based pipeline and the
# desktop crate is excluded from the cargo workspace anyway.
#
# Runners: Depot GitHub Actions runners (https://depot.dev/docs/github-actions).
# PREREQUISITE — one-time, dashboard-only: the `serialexp` GitHub org must be
# connected to Depot (install the Depot GitHub App + enable runners). Until
# that's done, jobs targeting `depot-*` labels queue with no runner to pick
# them up. Runners are an org-level Depot feature; they are NOT tied to the
# depot.json project id (that governs container builds/`depot bake` only).
#
# Note on macOS: Depot's macOS runners are Apple Silicon (M2/ARM) only — there
# is no Intel macOS runner. The x86_64-apple-darwin bundle is therefore
# cross-compiled from the ARM runner (rustup target installed below); the
# aarch64 bundle builds natively. Both Mac architectures still ship.
#
# Trigger: push a `desktop-v*` tag (e.g. `desktop-v0.1.0`), or run manually
# via the Actions tab. The release is created as a DRAFT so you can review the
# assets before publishing; `desktop/install.sh` pulls the latest *published*
# `desktop-v*` release, so publish the draft to make it installable.

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'depot-macos-latest'     # Apple Silicon (native)
            args: '--target aarch64-apple-darwin'
          - platform: 'depot-macos-latest'     # Intel (cross-compiled from ARM)
            args: '--target x86_64-apple-darwin'
          - platform: 'depot-ubuntu-22.04'
            args: ''
          - platform: 'depot-windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'depot-macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      - name: Install Linux dependencies (Ubuntu only)
        if: matrix.platform == 'depot-ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: desktop
        run: bun install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'scry desktop ${{ github.ref_name }}'
          releaseBody: 'scry desktop query app. Download the asset for your platform, or run the installer (see desktop/README.md).'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
