# SPA server for the scry marketing site.
#
# Single-page app: every unknown path falls back to index.html. Hashed Vite
# assets get a long immutable cache; index.html is never cached so a new deploy
# is picked up immediately.

server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compress text-like assets on the fly.
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        application/xml;

    # Vite emits content-hashed filenames under /assets — safe to cache forever.
    # One explicit Cache-Control (no `expires`, which would add a second).
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files  $uri =404;
    }

    # Never cache the HTML entrypoint, so deploys take effect at once.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: serve the file if it exists, else the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Lightweight health endpoint for k8s / load balancers.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
