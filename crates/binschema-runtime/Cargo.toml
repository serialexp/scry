[package]
name        = "binschema-runtime"
version     = "0.1.0"
edition.workspace = true
license.workspace = true
description = "Vendored binschema Rust runtime. Regenerated by scripts/gen-proto.sh; do not edit by hand."

[lib]
name = "binschema_runtime"
path = "src/lib.rs"

[dependencies]
# Required by the vendored `codecs.rs` (deflate/gzip codecs for
# binschema `compressed` regions). scry's current schemas use no
# `compressed` fields, so this is dormant today, but the vendored
# runtime is a faithful, unedited copy of upstream — we add the dep it
# needs rather than trimming the module out (which gen-proto.sh would
# only re-add on the next regen). Version matches binschema's own
# `rust/Cargo.toml`.
flate2 = "1.0"
